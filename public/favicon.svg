<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5a623"/>
      <stop offset="100%" style="stop-color:#e8681a"/>
    </linearGradient>
    <linearGradient id="note" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd166"/>
      <stop offset="100%" style="stop-color:#f5a623"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>

  <!-- Outer ring accent -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.4"/>

  <!-- Musical note - stem -->
  <rect x="36" y="14" width="3.5" height="22" rx="1.5" fill="url(#note)"/>

  <!-- Musical note - flag -->
  <path d="M39.5 14 Q50 17 48 25 Q44 20 39.5 21Z" fill="url(#note)"/>

  <!-- Musical note - head -->
  <ellipse cx="32" cy="36" rx="6.5" ry="5" transform="rotate(-15 32 36)" fill="url(#note)"/>

  <!-- Second smaller note - stem -->
  <rect x="24" y="20" width="2.5" height="16" rx="1" fill="url(#accent)" opacity="0.7"/>

  <!-- Second note - head -->
  <ellipse cx="19.5" cy="36" rx="4.5" ry="3.5" transform="rotate(-15 19.5 36)" fill="url(#accent)" opacity="0.7"/>

  <!-- Equalizer bars at bottom (queue vibe) -->
  <rect x="11" y="48" width="4" height="6" rx="2" fill="url(#accent)" opacity="0.9"/>
  <rect x="17" y="45" width="4" height="9" rx="2" fill="url(#accent)" opacity="0.9"/>
  <rect x="23" y="47" width="4" height="7" rx="2" fill="url(#accent)" opacity="0.9"/>
  <rect x="29" y="44" width="4" height="10" rx="2" fill="url(#note)" opacity="0.9"/>
  <rect x="35" y="46" width="4" height="8" rx="2" fill="url(#accent)" opacity="0.9"/>
  <rect x="41" y="49" width="4" height="5" rx="2" fill="url(#accent)" opacity="0.9"/>
  <rect x="47" y="47" width="4" height="7" rx="2" fill="url(#accent)" opacity="0.9"/>
</svg>
