<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5a623"/>
      <stop offset="100%" style="stop-color:#e8681a"/>
    </linearGradient>
    <linearGradient id="note" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd166"/>
      <stop offset="100%" style="stop-color:#f5a623"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect (apple touch icon style) -->
  <rect width="180" height="180" rx="40" ry="40" fill="url(#bg)"/>

  <!-- Outer ring accent -->
  <rect width="180" height="180" rx="40" ry="40" fill="none" stroke="url(#accent)" stroke-width="4" opacity="0.3"/>

  <!-- Musical note - stem -->
  <rect x="102" y="38" width="10" height="62" rx="4" fill="url(#note)"/>

  <!-- Musical note - flag -->
  <path d="M112 38 Q145 48 138 70 Q124 55 112 60Z" fill="url(#note)"/>

  <!-- Musical note - head -->
  <ellipse cx="90" cy="100" rx="18" ry="14" transform="rotate(-15 90 100)" fill="url(#note)"/>

  <!-- Second smaller note - stem -->
  <rect x="68" y="56" width="7" height="45" rx="3" fill="url(#accent)" opacity="0.75"/>

  <!-- Second note - head -->
  <ellipse cx="55" cy="101" rx="13" ry="10" transform="rotate(-15 55 101)" fill="url(#accent)" opacity="0.75"/>

  <!-- Equalizer bars at bottom -->
  <rect x="22" y="130" width="12" height="20" rx="6" fill="url(#accent)" opacity="0.9"/>
  <rect x="38" y="122" width="12" height="28" rx="6" fill="url(#accent)" opacity="0.9"/>
  <rect x="54" y="127" width="12" height="23" rx="6" fill="url(#accent)" opacity="0.9"/>
  <rect x="70" y="118" width="12" height="32" rx="6" fill="url(#note)" opacity="0.9"/>
  <rect x="86" y="124" width="12" height="26" rx="6" fill="url(#accent)" opacity="0.9"/>
  <rect x="102" y="132" width="12" height="18" rx="6" fill="url(#accent)" opacity="0.9"/>
  <rect x="118" y="126" width="12" height="24" rx="6" fill="url(#accent)" opacity="0.9"/>
  <rect x="134" y="129" width="12" height="21" rx="6" fill="url(#accent)" opacity="0.9"/>
  <rect x="150" y="121" width="12" height="29" rx="6" fill="url(#note)" opacity="0.9"/>
</svg>
